  <!-- Anti-flash tema: jalankan SEBELUM React mount agar tidak ada kedipan
         tema yang salah (Req 10.2). Kunci 'theme' harus konsisten dengan
         THEME_STORAGE_KEY pada src/lib/theme.js, dan kelas 'dark' pada <html>
         konsisten dengan sinkronisasi ThemeProvider. -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('theme');
        var prefersDark =
          window.matchMedia &&
          window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (stored === 'dark' || (stored !== 'light' && prefersDark)) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {
        /* localStorage tidak tersedia; abaikan tanpa melempar error. */
      }
    })();
  </script>
