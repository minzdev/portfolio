    <!-- Anti-flash tema: jalankan SEBELUM React mount (konsisten dengan beranda). -->
    <script>
        (function () {
            try {
                var stored = localStorage.getItem('theme');
                var prefersDark =
                    window.matchMedia &&
                    window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (stored === 'dark' || (stored !== 'light' && prefersDark)) {
                    document.documentElement.classList.add('dark');
                }
            } catch (e) {
                /* localStorage tidak tersedia; abaikan tanpa melempar error. */
            }
        })();
    </script>
